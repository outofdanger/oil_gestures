# Static gestures are recognized by MediaPipe's built-in (canned) gesture
# classifier via the GestureRecognizer backend. min_confidence gates the
# canned-gesture score before it is accepted.
static:
  enabled: true
  min_confidence: 0.70
  smoothing_window: 5
  gestures:
    - OPEN_PALM   # MediaPipe Open_Palm
    - FIST        # MediaPipe Closed_Fist
    - THUMB_UP    # MediaPipe Thumb_Up
    - VICTORY     # MediaPipe Victory
    - UNKNOWN

# Learned dynamic-gesture model (POINTING_INDEX, SWIPE_LEFT/RIGHT,
# ROTATE_CLOCKWISE/CCW, SQUEEZE/RELEASE). Cursor rules do not belong here.
# Runs as a dual-model ensemble (gestures.dynamic.model_loader): ST-GCN leads
# (fast trigger on hand pose), BiLSTM confirms/vetoes (suppresses false
# fires) - see dynamic_gestures/scripts/test_dynamic_model.py, where this
# logic was first validated on a live camera.
dynamic:
  enabled: true
  # Unused by the live model (it reads its own window length from each
  # checkpoint) - kept for forward compatibility with other model backends.
  sequence_length: 40
  # ST-GCN (lead/trigger) probability needed on a non-IDLE class. ST-GCN fires
  # on hand pose even with little motion, so keep this fairly high - but
  # veto_floor below is the stronger lever against accidental swipes.
  min_confidence: 0.82
  # BiLSTM (confirm/veto) probability the proposed class must independently
  # reach, or the trigger is suppressed. BiLSTM reads motion, so a high value
  # means "only fire when the hand actually moved like the gesture" - this is
  # what kills false swipes from small hand jitter. Lower it if real swipes
  # start getting missed.
  veto_floor: 0.70
  # Minimum seconds between two dynamic-channel fires (stepping selection via
  # SWIPE / opening a menu via POINTING_INDEX). Pure rate-limit - does not
  # affect recognition or the continuous ROTATE gestures.
  swipe_cooldown_seconds: 1.0
  # Torch device for the ST-GCN + BiLSTM ensemble. "auto" = CUDA GPU when
  # available (e.g. your RTX 4050), else CPU. Force with "cuda" or "cpu".
  device: auto
  # После срабатывания направления (swipe/rotate/squeeze) его противоположность
  # глушится на столько секунд - чтобы возвратный ход руки не отменял действие.
  # Больше = надёжнее от ложных откатов, но медленнее менять направление вручную.
  directional_lockout_seconds: 1.2
  # Checkpoint pair loaded by gestures.dynamic.model_loader.load_dynamic_model().
  # See dynamic_gestures/README.md for how they were trained and the other
  # variants available in dynamic_gestures/models/. Either set to null
  # disables dynamic recognition entirely (no model loaded).
  stgcn_checkpoint_path: "assets/models/pytorch/dynamic_stgcn_merged.pt"
  bilstm_checkpoint_path: "assets/models/pytorch/dynamic_bilstm_merged.pt"

cursor:
  # Temporary manual gate. A learned dynamic model will control activation later.
  enabled: false
  pointer_source: "INDEX_MCP"
  dry_run: true
  margin_x: 0.08
  margin_top: 0.10
  margin_bottom: 0.12
  invert_y: false
  smoothing_alpha: 1.0
  min_cutoff: 7.0
  beta: 0.080
  derivative_cutoff: 1.0
  dead_zone_points: 0.0
  max_speed_points_per_second: 50000.0
  reacquire_frames: 1
  lost_reset_seconds: 0.20
  # Усиление движения при захвате (grab/зажатая ЛКМ). 1.0 = как обычно;
  # < 1.0 = курсор проходит меньше на то же движение руки, точное
  # перетаскивание. Влияет ТОЛЬКО на grab, обычное движение не трогает.
  grab_sensitivity: 0.5

  # Cursor mode is toggled on/off by holding a static gesture. Debounced with a
  # dwell timer, a release latch (one show = one toggle) and a cooldown floor.
  activation:
    enabled: true
    gesture: "VICTORY"
    hold_seconds: 0.5
    cooldown_seconds: 1.0

  recognition:
    enabled: true
    confidence: 1.0
    index_pinch_tracking_enabled: true
    index_pinch_thumb_tip: 4
    index_pinch_tip: 8
    index_squeeze_ratio: 0.10
    index_release_ratio: 0.14
    middle_pinch_tracking_enabled: true
    middle_pinch_thumb_tip: 4
    middle_pinch_tip: 12
    middle_pinch_press_ratio: 0.10
    middle_pinch_release_ratio: 0.14

cursor_actions:
  cooldown_seconds: 0.50
  mapping:
    INDEX_MCP: "MOVE_CURSOR"
    INDEX_SQUEEZE: "GRAB"
    INDEX_RELEASE: "RELEASE"
    MIDDLE_PINCH: "RIGHT_CLICK"
