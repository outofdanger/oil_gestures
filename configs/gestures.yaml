static:
  enabled: true
  min_confidence: 0.70
  smoothing_window: 5
  ok_pinch_ratio: 0.16
  finger_extension_margin: 0.035
  fist_curl_margin: 0.015
  open_palm_min_extended: 4
  gestures:
    - OPEN_PALM
    - FIST
    - OK_SIGN
    - UNKNOWN

# Reserved for learned dynamic-gesture models. Cursor rules do not belong here.
dynamic:
  enabled: true
  sequence_length: 40
  min_confidence: 0.75

cursor:
  # Temporary manual gate. A learned dynamic model will control activation later.
  enabled: false
  pointer_source: "INDEX_MCP"
  dry_run: true
  margin_x: 0.08
  margin_top: 0.10
  margin_bottom: 0.12
  invert_y: false
  smoothing_alpha: 1.0
  min_cutoff: 7.0
  beta: 0.080
  derivative_cutoff: 1.0
  dead_zone_points: 0.0
  max_speed_points_per_second: 50000.0
  reacquire_frames: 1
  lost_reset_seconds: 0.20

  recognition:
    enabled: true
    confidence: 1.0
    index_pinch_tracking_enabled: true
    index_pinch_thumb_tip: 4
    index_pinch_tip: 8
    index_squeeze_ratio: 0.10
    index_release_ratio: 0.14
    middle_pinch_tracking_enabled: true
    middle_pinch_thumb_tip: 4
    middle_pinch_tip: 12
    middle_pinch_press_ratio: 0.10
    middle_pinch_release_ratio: 0.14

cursor_actions:
  cooldown_seconds: 0.50
  mapping:
    INDEX_MCP: "MOVE_CURSOR"
    INDEX_SQUEEZE: "GRAB"
    INDEX_RELEASE: "RELEASE"
